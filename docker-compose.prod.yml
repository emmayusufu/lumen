services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - research-api
      - collab
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  opa:
    image: openpolicyagent/opa:latest-debug
    restart: unless-stopped
    command: run --server --addr :8181 /policies
    volumes:
      - ./policies:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  kroki:
    image: yuzutech/kroki:latest
    restart: unless-stopped
    environment:
      KROKI_SAFE_MODE: SECURE
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      mc anonymous set none local/$${MINIO_BUCKET}
      "

  research-api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/app
      OPA_URL: http://opa:8181
      SECRET_KEY: ${SECRET_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      REDIS_URL: redis://redis:6379/0
      OTEL_SERVICE_NAME: lumen-backend
      OTEL_SERVICE_VERSION: 1.0.0
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      SITE_URL: https://${DOMAIN}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8742 --workers 2
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8742/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  collab:
    build:
      context: ./apps/collab
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/app
      SECRET_KEY: ${SECRET_KEY}
      PORT: 1234
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_COLLAB_URL: wss://${DOMAIN}/collab
        NEXT_PUBLIC_MINIO_URL: https://${DOMAIN}
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
        NEXT_PUBLIC_HYPERDX_API_KEY: ${NEXT_PUBLIC_HYPERDX_API_KEY:-}
        NEXT_PUBLIC_HYPERDX_SERVICE: ${NEXT_PUBLIC_HYPERDX_SERVICE:-lumen-web}
        NEXT_PUBLIC_HYPERDX_URL: ${NEXT_PUBLIC_HYPERDX_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_URL: http://research-api:8742
      NEXT_PUBLIC_COLLAB_URL: wss://${DOMAIN}/collab
      NEXT_PUBLIC_MINIO_URL: https://${DOMAIN}
      NEXT_PUBLIC_HYPERDX_API_KEY: ${NEXT_PUBLIC_HYPERDX_API_KEY:-}
      NEXT_PUBLIC_HYPERDX_SERVICE: ${NEXT_PUBLIC_HYPERDX_SERVICE:-lumen-web}
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
      KROKI_URL: http://kroki:8000
      PORT: 3000
    depends_on:
      - research-api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
