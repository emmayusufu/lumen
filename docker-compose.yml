services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/app/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}" --tlsMode disabled
    user: "0"
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: 8085
      ZITADEL_EXTERNALPROTOCOL: http
      ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH: /machinekey/zitadel-admin-sa.json
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINEKEY_TYPE: 1
    volumes:
      - zitadel_machinekey:/machinekey
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:latest-debug
    command: run --server --addr :8181 /policies
    volumes:
      - ./policies:/policies
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  docker-proxy:
    build:
      context: ./docker-proxy
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-proxy
    restart: unless-stopped

  traefik:
    image: traefik:v3.3
    command:
      - "--configfile=/traefik.yml"
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic:/dynamic:ro
    networks:
      - default
      - traefik-proxy
    depends_on:
      - docker-proxy
      - opa
      - zitadel
    restart: unless-stopped

  research-api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/app
    volumes:
      - ./apps/backend/app:/app/app
      - ./apps/backend/tests:/app/tests
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.research.rule=PathPrefix(`/api/research`)"
      - "traefik.http.routers.research.middlewares=jwt-auth@file"
      - "traefik.http.routers.research.service=research"
      - "traefik.http.services.research.loadbalancer.server.port=8000"
      - "traefik.http.routers.health.rule=Path(`/health`)"
      - "traefik.http.routers.health.service=health"
      - "traefik.http.services.health.loadbalancer.server.port=8000"
    restart: unless-stopped

  web:
    image: node:24-alpine
    working_dir: /app
    expose:
      - "3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:80
      - API_URL=http://traefik:80
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ZITADEL_ISSUER=http://${ZITADEL_DOMAIN:-localhost}:8085
      - ZITADEL_CLIENT_ID=${ZITADEL_CLIENT_ID}
      - ZITADEL_CLIENT_SECRET=${ZITADEL_CLIENT_SECRET}
      - ZITADEL_MACHINE_KEY=${ZITADEL_MACHINE_KEY}
      - ZITADEL_INTERNAL_URL=http://zitadel:8080
      - OPA_URL=http://opa:8181
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      - zitadel
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    restart: unless-stopped

  zitadel-init:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/zitadel-init:/app
      - zitadel_machinekey:/machinekey
    command: sh -c "npm install && npx tsx init.ts"
    environment:
      ZITADEL_URL: http://zitadel:8080
      ZITADEL_DOMAIN: ${ZITADEL_DOMAIN:-localhost}
      ZITADEL_PORT: 8085
      MACHINE_KEY_PATH: /machinekey/zitadel-admin-sa.json
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_REDIRECT_URI: ${NEXTAUTH_URL:-http://localhost}/api/auth/callback/zitadel
    depends_on:
      zitadel:
        condition: service_healthy
    profiles:
      - init

networks:
  traefik-proxy:

volumes:
  postgres_data:
  zitadel_machinekey:
