services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/app/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:latest-debug
    command: run --server --addr :8181 /policies
    volumes:
      - ./policies:/policies
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  research-api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8742:8742"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/app
      - OPA_URL=http://opa:8181
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./apps/backend/app:/app/app
      - ./apps/backend/tests:/app/tests
    command: uvicorn app.main:app --host 0.0.0.0 --port 8742 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8742/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: node:24-alpine
    working_dir: /app
    ports:
      - "3847:3847"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - BACKEND_URL=http://research-api:8742
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3847/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      - postgres
      - research-api
    restart: unless-stopped

volumes:
  postgres_data:
